content_rules:
  - YQN 官网用于校准服务能力，不得作为外部行业新闻替代品
  - 每条 YQN 可用点必须映射到已公开或内部确认可公开的能力
  - 不得承诺绝对时效、绝对低价、绝对无风险或无限库容
  - 不得写入客户名单、报价、合同、毛利、内部成本和未公开案例
