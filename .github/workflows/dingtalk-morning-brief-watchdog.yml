name: DingTalk YQN Daily 5 Minutes Watchdog

on:
  schedule:
    # 01:05/01:20/01:35/01:50 UTC equals 09:05/09:20/09:35/09:50 Asia/Shanghai.
    # GitHub scheduled workflows can be delayed or dropped under load, so use
    # several idempotent checks instead of relying on one watchdog tick.
    - cron: "5 1 * * 1-5"
    - cron: "20 1 * * 1-5"
    - cron: "35 1 * * 1-5"
    - cron: "50 1 * * 1-5"
  workflow_dispatch:
    inputs:
      brief_date:
        description: "YYYY-MM-DD, optional"
        required: false
        type: string
      dispatch_if_missing:
        description: "Trigger live dry_run=false when the 08:45 run is missing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  actions: write
  contents: read

concurrency:
  group: dingtalk-daily-5-minutes-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WATCHDOG_TARGET_WORKFLOW: dingtalk-morning-brief.yml
      WATCHDOG_REF: ${{ github.event.repository.default_branch }}
      WATCHDOG_BRIEF_DATE: ${{ github.event_name == 'workflow_dispatch' && inputs.brief_date || '' }}
      WATCHDOG_DISPATCH_IF_MISSING: ${{ github.event_name == 'workflow_dispatch' && inputs.dispatch_if_missing || 'true' }}
      DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      DINGTALK_OWNER_WEBHOOK_URL: ${{ secrets.DINGTALK_OWNER_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check 08:45 sender and dispatch fallback
        run: npm run dingtalk:watchdog
