name: DingTalk YQN Seller Problem Brief
run-name: YQN Seller Brief ${{ inputs.expected_date }} [${{ inputs.dispatch_id }}]

on:
  workflow_dispatch:
    inputs:
      brief_b64:
        description: "Base64 encoded validated seller-problem brief"
        required: true
        type: string
      expected_date:
        description: "Asia/Shanghai brief date"
        required: true
        type: string
      dry_run:
        description: "Validate only"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      dispatch_id:
        description: "Unique dispatch correlation id"
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: dingtalk-yqn-seller-problem-${{ inputs.expected_date }}
  cancel-in-progress: false

jobs:
  send-livestream-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Shanghai
      SELLER_BRIEF_JSON_B64: ${{ inputs.brief_b64 }}
      BRIEF_DATE: ${{ inputs.expected_date }}
      SELLER_BRIEF_SEND_APPROVED: ${{ inputs.dry_run == 'false' && 'true' || 'false' }}
      DINGTALK_YQN_LIVE_GROUP_ENABLED: ${{ vars.DINGTALK_YQN_LIVE_GROUP_ENABLED || 'false' }}
      DINGTALK_YQN_LIVE_GROUP_WEBHOOK_URL: ${{ secrets.DINGTALK_YQN_LIVE_GROUP_WEBHOOK_URL }}
      DINGTALK_YQN_LIVE_GROUP_SECRET: ${{ secrets.DINGTALK_YQN_LIVE_GROUP_SECRET }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run guardrail tests
        run: npm test

      - name: Validate and send livestream brief
        run: npm run codex:seller-brief:send
