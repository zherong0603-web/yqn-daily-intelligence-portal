name: DingTalk YQN North America Intelligence V1.4

on:
  schedule:
    # 22:00 UTC equals 06:00 Asia/Shanghai. Preflight only, no DingTalk send.
    - cron: "0 22 * * 0-4"
    # 00:45 UTC equals 08:45 Asia/Shanghai. GitHub Actions schedule has no timezone field.
    - cron: "45 0 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "demo or live"
        required: true
        default: "live"
        type: choice
        options:
          - demo
          - live
      brief_date:
        description: "YYYY-MM-DD, optional"
        required: false
        type: string
      dry_run:
        description: "Generate but do not send DingTalk"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  actions: read
  models: read
  pages: write
  id-token: write

concurrency:
  group: dingtalk-crossborder-intelligence-brief-v1-1
  cancel-in-progress: false

jobs:
  dingtalk-morning-brief:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: Asia/Shanghai
      BRIEF_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'live' }}
      BRIEF_DATE: ${{ github.event_name == 'workflow_dispatch' && inputs.brief_date || '' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || (github.event.schedule == '0 22 * * 0-4' && 'true' || vars.DINGTALK_DRY_RUN || 'true') }}
      DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      DINGTALK_FORMAL_WEBHOOK_URL: ${{ secrets.DINGTALK_FORMAL_WEBHOOK_URL }}
      DINGTALK_FORMAL_SECRET: ${{ secrets.DINGTALK_FORMAL_SECRET }}
      DINGTALK_YQN_LIVE_GROUP_WEBHOOK_URL: ${{ secrets.DINGTALK_YQN_LIVE_GROUP_WEBHOOK_URL }}
      DINGTALK_YQN_LIVE_GROUP_SECRET: ${{ secrets.DINGTALK_YQN_LIVE_GROUP_SECRET }}
      DINGTALK_OWNER_WEBHOOK_URL: ${{ secrets.DINGTALK_OWNER_WEBHOOK_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || vars.OPENAI_MODEL || 'gpt-5' }}
      OPENAI_WEB_SEARCH_ENABLED: "true"
      MAX_SEARCH_CALLS: ${{ vars.MAX_SEARCH_CALLS || '3' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_MODELS_MODEL: ${{ vars.GH_MODELS_MODEL || 'openai/gpt-4o' }}
      SITE_URL: ${{ vars.SITE_URL }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL || vars.PAGES_BASE_URL || vars.SITE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
      PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
      DINGTALK_FORMAL_GROUP_ENABLED: ${{ vars.DINGTALK_FORMAL_GROUP_ENABLED || 'false' }}
      DINGTALK_YQN_LIVE_GROUP_ENABLED: ${{ vars.DINGTALK_YQN_LIVE_GROUP_ENABLED || 'false' }}
      FAILURE_STAGE: checkout

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Mark failure stage for install
        run: echo "FAILURE_STAGE=npm ci" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Install preview browser
        run: npx playwright install --with-deps chromium

      - name: Mark failure stage for tests
        run: echo "FAILURE_STAGE=npm test" >> "$GITHUB_ENV"

      - name: Run tests
        run: npm test

      - name: Mark failure stage for brief generation
        run: echo "FAILURE_STAGE=build demo/live brief" >> "$GITHUB_ENV"

      - name: Build demo/live brief
        run: npm run dingtalk:generate

      - name: Build 06:00 research pack
        if: env.BRIEF_MODE == 'live'
        run: npm run dingtalk:mini-pack

      - name: Upload preflight research pack
        if: github.event_name == 'schedule' && github.event.schedule == '0 22 * * 0-4'
        uses: actions/upload-artifact@v4
        with:
          name: YQN_Daily_5_Minutes_Preflight_Research_Pack
          path: |
            data/dingtalk-briefs/*.mini_research_pack.json
            data/dingtalk-briefs/*.mini_research_pack.md
            data/dingtalk-briefs/*.source_report.json
          if-no-files-found: warn

      - name: Mark failure stage for risk check
        run: echo "FAILURE_STAGE=risk check" >> "$GITHUB_ENV"

      - name: Risk check
        run: npm run dingtalk:risk

      - name: Mark failure stage for archive
        run: echo "FAILURE_STAGE=archive brief" >> "$GITHUB_ENV"

      - name: Archive brief
        run: npm run dingtalk:archive

      - name: Prepare Pages artifact
        run: |
          rm -rf _pages
          cp -R dist _pages

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Mark failure stage for Pages deployment
        run: echo "FAILURE_STAGE=deploy GitHub Pages" >> "$GITHUB_ENV"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Mark failure stage for preview
        run: echo "FAILURE_STAGE=generate preview" >> "$GITHUB_ENV"

      - name: Generate preview
        env:
          PUBLIC_BASE_URL: ${{ steps.deployment.outputs.page_url }}
        run: npm run dingtalk:preview

      - name: Mark failure stage for pre-send validation
        run: echo "FAILURE_STAGE=pre-send validation" >> "$GITHUB_ENV"

      - name: Validate archive and message
        env:
          PUBLIC_BASE_URL: ${{ steps.deployment.outputs.page_url }}
        run: npm run dingtalk:validate

      - name: Mark failure stage for DingTalk send
        run: echo "FAILURE_STAGE=send DingTalk" >> "$GITHUB_ENV"

      - name: Send DingTalk when dry_run=false
        env:
          PUBLIC_BASE_URL: ${{ steps.deployment.outputs.page_url }}
        run: npm run dingtalk:send

      - name: Mark failure stage for delivery package
        run: echo "FAILURE_STAGE=package delivery" >> "$GITHUB_ENV"

      - name: Package delivery
        run: npm run dingtalk:package

      - name: Upload delivery artifact
        uses: actions/upload-artifact@v4
        with:
          name: YQN_Daily_5_Minutes_V1_4_Delivery
          path: |
            delivery/YQN_Daily_5_Minutes_V1_4_Delivery.zip
            delivery/YQN_Daily_5_Minutes_V1_4_Delivery/
          if-no-files-found: error

      - name: Notify owner on failure
        if: failure()
        run: npm run dingtalk:failure
