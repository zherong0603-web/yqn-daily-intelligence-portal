name: Daily Briefing Portal

on:
  schedule:
    # 01:37 UTC equals 09:37 Asia/Taipei. GitHub Actions schedule does not support timezone.
    - cron: "37 1 * * *"
  workflow_dispatch:
    inputs:
      brief_date:
        description: "Optional date override for backfill, format YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-briefing-portal
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: Asia/Taipei
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_SIGN_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
      BRIEF_ENCRYPTION_ENABLED: ${{ vars.BRIEF_ENCRYPTION_ENABLED || 'false' }}
      PAGE_ACCESS_PASSPHRASE: ${{ secrets.PAGE_ACCESS_PASSPHRASE }}
      SITE_URL: ${{ vars.SITE_URL }}
      BRIEF_DATE: ${{ github.event_name == 'workflow_dispatch' && inputs.brief_date || '' }}
      FAILURE_STAGE: checkout

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Mark failure stage for tests
        run: echo "FAILURE_STAGE=npm test" >> "$GITHUB_ENV"

      - name: Run tests
        run: npm test

      - name: Mark failure stage for generation
        run: echo "FAILURE_STAGE=generate brief" >> "$GITHUB_ENV"

      - name: Generate brief
        run: npm run generate

      - name: Export brief notification preview
        run: node scripts/export-brief-env.cjs

      - name: Mark failure stage for site build
        run: echo "FAILURE_STAGE=build site" >> "$GITHUB_ENV"

      - name: Build site
        run: npm run build

      - name: Mark failure stage for data commit
        run: echo "FAILURE_STAGE=commit generated brief" >> "$GITHUB_ENV"

      - name: Commit generated brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/briefs
          if git diff --cached --quiet; then
            echo "No data/briefs changes to commit."
          else
            git commit -m "chore: update daily brief ${BRIEF_DATE}"
            git pull --rebase
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Mark failure stage for Pages deployment
        run: echo "FAILURE_STAGE=deploy GitHub Pages" >> "$GITHUB_ENV"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Feishu success card
        if: success()
        env:
          SITE_URL: ${{ steps.deployment.outputs.page_url }}
        run: npm run notify:success

      - name: Send Feishu failure card
        if: failure()
        run: npm run notify:failure
