name: DingTalk YQN Intro

on:
  workflow_dispatch:
    inputs:
      target:
        description: "intro target"
        required: true
        default: "livestream"
        type: choice
        options:
          - livestream
          - formal
          - both
          - ryan

permissions:
  contents: read

concurrency:
  group: dingtalk-yqn-intro
  cancel-in-progress: false

jobs:
  send-intro:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      DRY_RUN: "false"
      DINGTALK_FORMAL_GROUP_ENABLED: ${{ (inputs.target == 'formal' || inputs.target == 'both') && 'true' || 'false' }}
      DINGTALK_FORMAL_WEBHOOK_URL: ${{ secrets.DINGTALK_FORMAL_WEBHOOK_URL }}
      DINGTALK_FORMAL_SECRET: ${{ secrets.DINGTALK_FORMAL_SECRET }}
      DINGTALK_YQN_LIVE_GROUP_ENABLED: ${{ (inputs.target == 'livestream' || inputs.target == 'both') && 'true' || 'false' }}
      DINGTALK_YQN_LIVE_GROUP_WEBHOOK_URL: ${{ secrets.DINGTALK_YQN_LIVE_GROUP_WEBHOOK_URL }}
      DINGTALK_YQN_LIVE_GROUP_SECRET: ${{ secrets.DINGTALK_YQN_LIVE_GROUP_SECRET }}
      DINGTALK_WEBHOOK_URL: ${{ inputs.target == 'ryan' && secrets.DINGTALK_WEBHOOK_URL || '' }}
      DINGTALK_SECRET: ${{ inputs.target == 'ryan' && secrets.DINGTALK_SECRET || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send DingTalk intro
        run: npm run dingtalk:intro
